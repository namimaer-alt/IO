<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Free Robux Generator 2026 - Unlimited Robux for Roblox</title>
    <meta name="description" content="Get free Robux for your Roblox account with our 2026 generator. Safe, fast, and no password required. Start earning Robux today!">
    <meta name="keywords" content="Robux generator, free robux, roblox hacks, earn robux 2026">
    
    <meta property="og:title" content="Free Robux Generator 2026">
    <meta property="og:description" content="Join thousands of players getting free Robux every day!">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        :root {
            --var-border-radius: 12px;
            --var-color-red: #e03e53;
            --var-color-blue: #00b6fe;
            --var-color-green: #97cc3c;
            --var-color-yellow: #e4e726;
            --var-text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            font-family: 'Titan One', cursive;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("https://d266key948fg17.cloudfront.net/uploads/15931055727a68f41214aeaf0c86c79b91b1cc39e9.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 850px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #logo {
            max-width: 350px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5));
        }

        .input-container, .kudos-container, #loading-container {
            display: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px; 
            border-radius: var(--var-border-radius);
            border: 3px solid white;
            width: 100%;
            box-sizing: border-box;
        }

        .kudos-container h2 {
            font-size: 2rem;
            margin-top: 0;
        }

        input.username-input {
            width: 80%;
            font-size: 1.5rem;
            padding: 15px;
            border: none;
            border-radius: var(--var-border-radius);
            margin: 20px 0;
            background: #fff;
            color: #333;
            text-align: center;
            outline: none;
        }

        .btn-main {
            background-color: var(--var-color-blue);
            color: white;
            padding: 15px 40px;
            font-size: 1.8rem;
            border: 3px solid white;
            border-radius: var(--var-border-radius);
            cursor: pointer;
            text-shadow: var(--var-text-shadow);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ----- PC & TABLET DESIGN ----- */
        .kudos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; 
            margin-top: 20px;
            width: 100%;
        }

        .kudos-box {
            border: 4px solid white;
            border-radius: var(--var-border-radius);
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .kudos-box:hover { transform: translateY(-5px); box-shadow: 0 0 25px white; }
        
        .bundle-title { background: #004407; padding: 15px; font-size: 1.2rem; letter-spacing: 1px; } 
        .bundle-amount { background: #006400; padding: 15px; font-size: 1.4rem; } 
        .kudos-image { width: 100%; max-width: 140px; padding: 20px 10px; box-sizing: border-box; } 

        /* ----- MOBILE DESIGN ----- */
        @media (max-width: 650px) {
            .input-container, .kudos-container, #loading-container { padding: 15px; }
            .kudos-container h2 { font-size: 1.5rem; }
            .kudos-grid { gap: 5px; }
            .kudos-box { border: 2px solid white; }
            .bundle-title { padding: 6px 2px; font-size: 0.65rem; }
            .bundle-amount { padding: 8px 2px; font-size: 0.75rem; }
            .kudos-image { max-width: 60px; padding: 10px 2px; }
            input.username-input { width: 95%; font-size: 1.2rem; }
            .btn-main { font-size: 1.4rem; padding: 12px 25px; }
            #logo { max-width: 250px; }
        }

        .loading-status { font-size: 1.6rem; margin-bottom: 20px; }
        .manual-verify-button { display: none; background: var(--var-color-green); padding: 20px; border-radius: 10px; border: 3px solid white; cursor: pointer; }

        h1.seo-hidden { position: absolute; left: -9999px; }

        /* =========================================
           CONTENT LOCKER IFRAME OVERLAY 
           ========================================= */
        .locker-overlay {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.85); /* Khalfiya k7la mdbba bach yban zwin */
            z-index: 9999;
        }

        .locker-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1 class="seo-hidden">Roblox Robux Generator Free 2026</h1>

    <div class="container">
        <img src="https://d266key948fg17.cloudfront.net/uploads/16619944223d89a36c94e4f44ed75934c51e19f251.png" 
             alt="Roblox Robux Generator Logo" 
             class="animate__animated animate__bounceInDown" id="logo">

        <div id="kudos-container" class="animate__animated animate__fadeIn">
            <h2>Select Robux Amount</h2>
            <div class="kudos-grid">
                <div class="kudos-box" onclick="selectBundle('1,500')">
                    <div class="bundle-title">STARTER</div>
                    <img class="kudos-image" src="https://d266key948fg17.cloudfront.net/uploads/16738350432e81b6597ff4004d9e57a7cebf22e927.png" alt="1500 Robux">
                    <div class="bundle-amount">1500 ROBUX</div>
                </div>
                <div class="kudos-box" onclick="selectBundle('5,500')">
                    <div class="bundle-title">POPULAR</div>
                    <img class="kudos-image" src="https://d266key948fg17.cloudfront.net/uploads/16738350432e81b6597ff4004d9e57a7cebf22e927.png" alt="5500 Robux">
                    <div class="bundle-amount">5500 ROBUX</div>
                </div>
                <div class="kudos-box" onclick="selectBundle('9,999')">
                    <div class="bundle-title">ULTIMATE</div>
                    <img class="kudos-image" src="https://d266key948fg17.cloudfront.net/uploads/16738350432e81b6597ff4004d9e57a7cebf22e927.png" alt="9999 Robux">
                    <div class="bundle-amount">9999 ROBUX</div>
                </div>
            </div>
        </div>

        <div id="usernameFromContainer" class="input-container animate__animated animate__fadeIn">
            <h2>Enter Username</h2>
            <p>Connection to Roblox Global Servers...</p>
            <input id="username-input" class="username-input" type="text" placeholder="Roblox Username">
            <button class="btn-main" onclick="startLoading()">Generate Now</button>
        </div>

        <div id="loading-container" class="animate__animated animate__fadeIn">
            <div id="loading-status" class="loading-status">Initializing...</div>
            <div class="manual-verify-button btn-main" id="manual-verify-button" onclick="showLocker()">Verify Now</div>
        </div>
    </div>

    <div id="locker-overlay" class="locker-overlay">
        <iframe src="https://quikfun.info/cl/i/qnnw94"></iframe>
    </div>

    <script>
        let selectedAmount = "";

        function selectBundle(amount) {
            selectedAmount = amount;
            document.getElementById('kudos-container').style.display = 'none';
            document.getElementById('usernameFromContainer').style.display = 'block';
        }

        function startLoading() {
            const user = document.getElementById('username-input').value;
            if(!user) { alert("Please enter username!"); return; }

            document.getElementById('usernameFromContainer').style.display = 'none';
            document.getElementById('loading-container').style.display = 'block';
            
            const status = document.getElementById('loading-status');
            const steps = [
                {t: "Connecting to Roblox database...", c: "#fff"},
                {t: `User '${user}' found!`, c: "var(--var-color-green)"},
                {t: `Injecting ${selectedAmount} Robux...`, c: "var(--var-color-yellow)"},
                {t: "Finalizing transaction...", c: "#fff"},
                {t: "Human Verification Required!", c: "var(--var-color-red)"}
            ];

            steps.forEach((step, i) => {
                setTimeout(() => {
                    status.innerHTML = step.t;
                    status.style.color = step.c;
                    if(i === steps.length - 1) {
                        document.getElementById('manual-verify-button').style.display = 'block';
                    }
                }, i * 1500);
            });
        }

        // Hna katban l-Iframe dyal l-Locker dyalk
        function showLocker() {
            document.getElementById('locker-overlay').style.display = 'block';
        }

        document.getElementById('kudos-container').style.display = 'block';
    </script>
</body>
</html>
