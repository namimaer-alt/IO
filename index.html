<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Update 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #f5e642;
      --yellow-dark: #c9bc00;
      --bg: #1a1a1a;
      --text: #e8e8e8;
      --text-dim: #888;
      --border: #333;
      --card: #252525;
      --red: #e74c3c;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }

    /* BG Layers */
    .bg-layer { position: fixed; inset: 0; z-index: 0; background: linear-gradient(135deg, #0e0e0e 0%, #1c1c1c 40%, #141414 100%); overflow: hidden; }
    .bg-layer::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px); }
    .bg-glow { position: absolute; top: -30%; left: -20%; width: 80%; height: 80%; background: radial-gradient(ellipse, rgba(245,230,66,0.04) 0%, transparent 65%); pointer-events: none; }
    .bg-glow2 { position: absolute; bottom: -20%; right: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(245,230,66,0.03) 0%, transparent 65%); pointer-events: none; }
    .bg-lines { position: absolute; inset: 0; overflow: hidden; opacity: 0.07; }
    .bg-lines span { position: absolute; display: block; background: linear-gradient(90deg, transparent, rgba(245,230,66,0.5), transparent); height: 1px; width: 250%; transform-origin: left center; left: -30%; }
    .bg-lines span:nth-child(1) { top: 20%; transform: rotate(-15deg); }
    .bg-lines span:nth-child(2) { top: 45%; transform: rotate(-15deg); opacity: 0.5; }
    .bg-lines span:nth-child(3) { top: 70%; transform: rotate(-15deg); opacity: 0.3; }

    /* LOADER */
    #loader { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.7s ease; }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    .loader-icon { font-size: 64px !important; color: var(--yellow); animation: spin 2s linear infinite; display: block; filter: drop-shadow(0 0 20px rgba(245,230,66,0.5)); }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .loader-bar-wrap { width: 180px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
    .loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--yellow-dark), var(--yellow)); border-radius: 3px; transition: width 2s ease; box-shadow: 0 0 10px var(--yellow); }

    /* PAGE STRUCTURE */
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 16px; opacity: 0; transition: opacity 0.5s ease 0.3s; }
    .page.visible { opacity: 1; }
    .site-header { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
    .site-header img { height: 54px; filter: drop-shadow(0 0 12px rgba(245,230,66,0.4)); }
    .site-header h1 { font-family: 'Rajdhani', sans-serif; font-size: clamp(22px, 5vw, 34px); font-weight: 700; color: var(--yellow); letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 20px rgba(245,230,66,0.3); }

    /* CARD DESIGN */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; width: 100%; max-width: 480px; position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,230,66,0.06) inset; }
    .card::before { content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px; background: linear-gradient(90deg, transparent, rgba(245,230,66,0.3), transparent); }
    .step-badge { position: absolute; top: -16px; left: 28px; background: var(--yellow); color: #111; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 14px rgba(245,230,66,0.5); }
    .card-title { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 22px; margin-top: 8px; }

    /* INPUTS & PLATFORMS */
    .input-wrap { display: flex; align-items: center; gap: 10px; background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; padding: 0 14px; margin-bottom: 8px; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-wrap:focus-within { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(245,230,66,0.1); }
    .input-wrap .material-icons-two-tone { color: var(--yellow); font-size: 20px; opacity: 0.8; }
    .input-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 14px; padding: 13px 0; }
    .input-wrap input::placeholder { color: #555; }
    .platforms { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .plat-item { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 60px; }
    .plat { width: 100%; aspect-ratio: 1; background: #1e1e1e; border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #666; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .plat.active { border-color: var(--yellow); box-shadow: 0 0 16px rgba(245,230,66,0.25); }
    .plat.active i { color: var(--yellow); }
    .proceed-btn { width: 100%; margin-top: 22px; padding: 14px; background: linear-gradient(135deg, #d4c800, var(--yellow)); color: #111; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(245,230,66,0.3); }

    /* GIFT CARD - RESPONSIVE FIX */
    .gift-card-visual {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(245,230,66,0.2);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .gift-card-amount { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; color: var(--yellow); text-shadow: 0 0 20px rgba(245,230,66,0.3); }
    
    .code-row {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; background: rgba(0,0,0,0.4); 
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px 14px;
    }
    .code-segment, .code-dash, .code-hidden {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px; letter-spacing: 2px; color: #fff;
    }
    .code-hidden { color: rgba(255,255,255,0.15); }
    .code-hidden.revealed { color: var(--yellow); text-shadow: 0 0 10px rgba(245,230,66,0.4); }

    /* FAKE PROOF STYLES */
    .fake-proof {
      position: fixed; bottom: 20px; left: 20px; z-index: 1000;
      background: rgba(30, 30, 30, 0.95); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 15px; display: flex; align-items: center;
      gap: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      transform: translateY(150%); transition: transform 0.5s ease;
      max-width: 280px; backdrop-filter: blur(5px);
    }
    .fake-proof.show { transform: translateY(0); }
    .proof-img { width: 40px; height: 40px; background: var(--yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #111; font-weight: bold; font-size: 18px; flex-shrink: 0; }
    .proof-content { font-size: 12px; color: var(--text); line-height: 1.4; }
    .proof-content b { color: var(--yellow); }
    .proof-time { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* MOBILE SPECIFIC CSS */
    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .gift-card-visual { padding: 18px 14px; }
      .code-row { padding: 8px 6px; gap: 3px; }
      .code-segment, .code-dash, .code-hidden { font-size: 14px; letter-spacing: 1px; }
      .lock-icon { font-size: 14px !important; }
      .fake-proof { left: 10px; bottom: 10px; right: 10px; max-width: calc(100% - 20px); }
    }

    /* OGAds Frame Fix */
    #ogadsFrame { width:100%; min-height:550px; border-radius:10px; border:none; background:transparent; overflow:hidden; }

    /* ANIMATIONS */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .bounce-in { animation: bounceIn 0.45s ease forwards; }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.75); } 100% { opacity: 1; transform: scale(1); } }
    #step2, #step3, #step4 { display: none; }
  </style>
</head>
<body>

<div class="bg-layer"><div class="bg-glow"></div><div class="bg-lines"><span></span></div></div>

<div id="loader">
  <span class="material-icons-two-tone loader-icon">settings</span>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
</div>

<div class="fake-proof" id="fakeProof">
  <div class="proof-img">R</div>
  <div class="proof-content">
    <div id="proofText"><b>User123</b> just claimed a <b>$25 Robux Card</b></div>
    <div class="proof-time">Just now</div>
  </div>
</div>

<div class="page" id="mainPage">
  <header class="site-header">
    <img src="img/logo-removebg-preview.png" alt="Logo" onerror="this.style.display='none'" />
    <h1>Update 2026</h1>
  </header>

  <div class="card" id="step1">
    <div class="step-badge">1</div>
    <p class="card-title">Enter username & platform</p>
    <div class="input-wrap">
      <span class="material-icons-two-tone">face</span>
      <input type="text" id="usernameInput" placeholder="Your Username..." />
    </div>
    <div class="platforms">
      <div class="plat-item"><div class="plat" data-platform="PC" data-icon="fab fa-windows"><i class="fab fa-windows"></i></div></div>
      <div class="plat-item"><div class="plat" data-platform="Xbox" data-icon="fab fa-xbox"><i class="fab fa-xbox"></i></div></div>
      <div class="plat-item"><div class="plat" data-platform="Android" data-icon="fab fa-android"><i class="fab fa-android"></i></div></div>
      <div class="plat-item"><div class="plat" data-platform="iOS" data-icon="fab fa-apple"><i class="fab fa-apple"></i></div></div>
    </div>
    <button class="proceed-btn" id="proceedBtn">Proceed</button>
  </div>

  <div class="card" id="step2">
    <div class="step-badge">2</div>
    <div style="text-align:center">
      <span class="material-icons-two-tone fa-spin" style="font-size:48px;color:var(--yellow)">rotate_right</span>
      <h2 style="font-family:'Rajdhani';margin:10px 0;color:var(--yellow)">Verifying Account</h2>
      <div style="background:#1e1e1e;height:8px;border-radius:4px;overflow:hidden;margin:15px 0">
        <div id="progressBar" style="width:0%;height:100%;background:var(--yellow);transition:0.3s"></div>
      </div>
      <p id="progressPct" style="font-size:12px;color:var(--text-dim)">0%</p>
    </div>
  </div>

  <div class="card" id="step3">
    <div class="step-badge">3</div>
    <div class="gift-card-visual">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
        <div style="width:30px;height:30px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:900">R</div>
        <div style="font-family:'Rajdhani';font-weight:bold;letter-spacing:1px">ROBLOX GIFT CARD</div>
      </div>
      <div class="gift-card-amount">$25.00</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:15px">ROBUX VALUE</div>
      <div class="code-row">
        <span class="code-segment">4RT9</span><span class="code-dash">-</span>
        <span class="code-segment">KM22</span><span class="code-dash">-</span>
        <span class="code-segment">QP90</span><span class="code-dash">-</span>
        <span class="code-hidden" id="seg1">XXXX</span>
        <span class="material-icons-two-tone" id="lockIcon" style="font-size:18px;margin-left:auto">lock</span>
      </div>
    </div>
    <div id="lockerWrap">
        <div style="font-size:11px;text-align:center;margin-bottom:10px;color:var(--yellow)">VERIFY TO UNLOCK CODE</div>
        <iframe id="ogadsFrame" src="https://quikfun.info/cl/i/qnnw94" scrolling="no"></iframe>
    </div>
  </div>
</div>

<script>
  // Simple Loader
  setTimeout(() => { document.getElementById('loaderBar').style.width = '100%'; }, 50);
  setTimeout(() => {
    document.getElementById('loader').classList.add('fade-out');
    document.getElementById('mainPage').classList.add('visible');
    // Start Fake Proofs after site loads
    startFakeProofs();
  }, 2000);

  let selectedPlat = '';
  document.querySelectorAll('.plat').forEach(p => {
    p.onclick = () => {
      document.querySelectorAll('.plat').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      selectedPlat = p.dataset.platform;
    };
  });

  document.getElementById('proceedBtn').onclick = () => {
    if(!selectedPlat || !document.getElementById('usernameInput').value) return alert('Enter details');
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    let p = 0;
    let iv = setInterval(() => {
      p += Math.floor(Math.random() * 7) + 2;
      if(p > 100) p = 100;
      document.getElementById('progressBar').style.width = p + '%';
      document.getElementById('progressPct').innerText = p + '%';
      if(p >= 100) {
        clearInterval(iv);
        setTimeout(() => {
          document.getElementById('step2').style.display = 'none';
          document.getElementById('step3').style.display = 'block';
        }, 800);
      }
    }, 200);
  };

  // FAKE PROOF LOGIC
  function startFakeProofs() {
    const users = ['ProGamer_99', 'RobloxKing', 'Alex_Smith', 'Sarah_Gamer', 'Elite_Player', 'Ninja_X', 'X-Hacker-X', 'Bella_Games', 'TheRedDev', 'Z-Robux-Z'];
    const proofElement = document.getElementById('fakeProof');
    const proofText = document.getElementById('proofText');

    function showProof() {
      const randomUser = users[Math.floor(Math.random() * users.length)];
      proofText.innerHTML = `<b>${randomUser}</b> just claimed a <b>$25 Robux Card</b>`;
      proofElement.classList.add('show');
      
      setTimeout(() => {
        proofElement.classList.remove('show');
      }, 4000);
    }

    // Show first proof after 5 seconds
    setTimeout(showProof, 5000);
    // Show proof every 12 to 20 seconds
    setInterval(showProof, Math.floor(Math.random() * 8000) + 12000);
  }

  // OGAds Listener
  window.addEventListener('message', function(e) {
    if (e.data === 'offerCompleted' || e.data === 'complete') {
      document.getElementById('seg1').innerText = '7X4Q';
      document.getElementById('seg1').classList.add('revealed');
      document.getElementById('lockIcon').innerText = 'lock_open';
      document.getElementById('lockerWrap').style.display = 'none';
    }
  });
</script>
</body>
</html>
